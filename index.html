<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GPT Georgia Tender Monitor</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f5f7;
  color:#1f2937;
}

.wrapper{display:flex;min-height:100vh}

.sidebar{
  width:290px;
  background:#111827;
  color:white;
  padding:24px;
}

.logo{
  font-size:22px;
  font-weight:700;
  margin-bottom:26px;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.menu button{
  background:rgba(255,255,255,0.04);
  border:none;
  color:white;
  padding:13px;
  border-radius:12px;
  cursor:pointer;
  text-align:left;
  font-size:14px;
  line-height:1.35;
}

.menu button.active{background:#2563eb}

.menu button:hover{
  background:#2563eb;
  transform:translateX(3px);
  transition:0.2s;
}

.main{
  flex:1;
  padding:28px;
}

.hero{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:24px;
}

.hero h1{
  margin:0;
  font-size:32px;
  font-weight:800;
}

.hero p{
  margin-top:8px;
  color:#6b7280;
  font-size:15px;
}

.hero-status{
  background:#dcfce7;
  color:#166534;
  padding:10px 16px;
  border-radius:999px;
  font-weight:700;
  font-size:13px;
}

.search input{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  font-size:16px;
  box-shadow:0 4px 18px rgba(0,0,0,0.06);
  margin-bottom:24px;
}

.quick-filters{
  display:flex;
  gap:10px;
  margin-bottom:22px;
  flex-wrap:wrap;
}

.qf{
  border:none;
  background:white;
  border:1px solid #e5e7eb;
  padding:10px 16px;
  border-radius:999px;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

.qf:hover{
  transform:translateY(-2px);
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.active-qf{
  background:#2563eb;
  color:white;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  margin-bottom:28px;
}

.stat{
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 4px 18px rgba(0,0,0,0.06);
  border:1px solid #eef2f7;
  transition:0.25s;
}

.stat:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(37,99,235,0.10);
}

.stat span{color:#6b7280;font-size:14px}
.stat strong{display:block;margin-top:10px;font-size:28px}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(360px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:22px;
  padding:22px;
  box-shadow:0 4px 20px rgba(0,0,0,0.06);
  border:1px solid #e5e7eb;
  transition:0.25s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 30px rgba(0,0,0,0.10);
}

.badges{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:14px;
}

.badge{
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

.c45100000{background:#fef3c7;color:#92400e}
.c45112700{background:#dcfce7;color:#166534}
.c45112710{background:#d1fae5;color:#047857}
.c45112720{background:#dbeafe;color:#1d4ed8}
.c45112723{background:#fce7f3;color:#be185d}
.default{background:#e5e7eb;color:#374151}

.status-badge,
.review-badge{
  display:inline-flex;
  align-items:center;
  padding:3px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  margin:2px 0;
}

.status-active{background:#dbeafe;color:#1d4ed8}
.status-warning{background:#fef3c7;color:#92400e}
.status-success{background:#dcfce7;color:#166534}
.status-ended{background:#e5e7eb;color:#374151}

.review-new{background:#e5e7eb;color:#374151}
.review-review{background:#fef3c7;color:#92400e}
.review-relevant{background:#dcfce7;color:#166534}
.review-ignored{background:#fee2e2;color:#991b1b}

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}

.priority{
  font-size:13px;
  font-weight:700;
}

.high{color:#dc2626}
.medium{color:#d97706}
.low{color:#6b7280}

.title{
  font-size:18px;
  font-weight:700;
  line-height:1.4;
  margin-bottom:14px;
}

.meta{
  color:#4b5563;
  line-height:1.8;
  font-size:15px;
}

.actions{
  margin-top:18px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  text-decoration:none;
  border:none;
  background:#111827;
  color:white;
  padding:12px 16px;
  border-radius:12px;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
}

.btn:hover{background:#2563eb}

.btn-warning{background:#92400e}
.btn-success{background:#166534}
.btn-danger{background:#991b1b}
.btn-muted{background:#374151}

.empty{
  background:white;
  padding:30px;
  border-radius:20px;
}

.modal{
  display:none;
  position:fixed;
  z-index:9999;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(17,24,39,0.65);
  backdrop-filter:blur(4px);
}

.modal-content{
  background:white;
  width:min(1100px,94%);
  max-height:86vh;
  overflow-y:auto;
  margin:40px auto;
  border-radius:24px;
  padding:28px;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
  animation:modalShow 0.2s ease;
}

@keyframes modalShow{
  from{transform:translateY(15px);opacity:0}
  to{transform:translateY(0);opacity:1}
}

.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:22px;
}

.modal-header h2{
  margin:0;
  font-size:24px;
}

.close-btn{
  border:none;
  background:#f3f4f6;
  width:38px;
  height:38px;
  border-radius:999px;
  cursor:pointer;
  font-size:16px;
  font-weight:700;
}

.close-btn:hover{background:#e5e7eb}

.modal-body{
  color:#374151;
  line-height:1.8;
}

.modal-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
  margin-top:20px;
}

.modal-item{
  background:#f9fafb;
  border:1px solid #eef2f7;
  border-radius:16px;
  padding:14px;
}

.modal-label{
  font-size:12px;
  font-weight:700;
  color:#6b7280;
  text-transform:uppercase;
  margin-bottom:8px;
}

.modal-value{
  font-size:15px;
  font-weight:600;
  color:#111827;
}

.modal-actions{
  margin-top:26px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.count-danger{color:#ef4444;font-weight:800}
.count-warning{color:#f59e0b;font-weight:800}
.count-safe{color:#22c55e;font-weight:800}
.count-closed{color:#94a3b8;font-weight:800}
.count-normal{color:#6b7280;font-weight:800}

@media(max-width:1000px){
  .wrapper{flex-direction:column}
  .sidebar{width:100%}
  .stats{grid-template-columns:1fr 1fr}
}

@media(max-width:650px){
  .stats{grid-template-columns:1fr}
  .grid{grid-template-columns:1fr}
  .modal-grid{grid-template-columns:1fr}
}
</style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>
<div class="wrapper">

  <div class="sidebar">
    <div class="logo">🇬🇪 Tender Monitor</div>

    <div class="menu">
      <button class="active" onclick="setFilter('all', this)">Все тендеры</button>
      <button onclick="setFilter('review', this)">🔍 Need Review</button>
      <button onclick="setFilter('relevant', this)">⭐ Relevant</button>
      <button onclick="setFilter('45100000', this)">45100000<br>Подготовка стройплощадки</button>
      <button onclick="setFilter('45112720', this)">45112720<br>Спорт / зоны отдыха</button>
      <button onclick="setFilter('45112700', this)">45112700<br>Ландшафтные работы</button>
      <button onclick="setFilter('45112723', this)">45112723<br>Игровые площадки</button>
      <button onclick="setFilter('45112710', this)">45112710<br>Зелёные зоны</button>
      <button onclick="setFilter('ignored', this)">🗑 Ignored tenders</button>
    </div>
  </div>

  <div class="main">

    <div class="hero">
      <div>
        <h1>🇬🇪 Georgia Procurement Intelligence</h1>
        <p>AI-powered CPV monitoring & tender lifecycle tracking</p>
      </div>

      <div class="hero-status">● LIVE MONITORING</div>
    </div>

    <div class="search">
      <input
        type="text"
        id="searchInput"
        placeholder="Поиск: Rustavi, NAT2600, 45112723..."
      />
    </div>

    <div class="quick-filters">
      <button onclick="setQuickFilter('all')" class="qf active-qf">ALL</button>
      <button onclick="setQuickFilter('high')" class="qf">HIGH VALUE</button>
      <button onclick="setQuickFilter('playground')" class="qf">PLAYGROUND</button>
      <button onclick="setQuickFilter('landscape')" class="qf">LANDSCAPE</button>
      <button onclick="setQuickFilter('soon')" class="qf">DEADLINE SOON</button>
    </div>

    <div class="stats">
      <div class="stat">
        <span>ACTIVE TENDERS</span>
        <strong id="totalCount">0</strong>
      </div>

      <div class="stat">
        <span>NEW TODAY</span>
        <strong id="todayCount">0</strong>
      </div>

      <div class="stat">
        <span>NEED REVIEW</span>
        <strong id="reviewCount">0</strong>
      </div>

      <div class="stat">
        <span>TOTAL VALUE</span>
        <strong id="budgetCount">—</strong>
      </div>
    </div>

    <div class="grid" id="tenderGrid"></div>

  </div>
</div>

<div id="tenderModal" class="modal">
  <div class="modal-content">

    <div class="modal-header">
      <h2 id="modalTitle">Tender</h2>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>

    <div class="modal-body" id="modalBody"></div>

  </div>
</div>

<script>
const SUPABASE_URL =
  "https://pibdlregqkpgwapdikdc.supabase.co";

const SUPABASE_KEY =
  "sb_publishable_xo8SnVOwSqDuKqXBqCT1ZA_xNAgssrv";

const supabaseClient =
  supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
  );
const CSV_FILE = "tenders.csv";

let ALL_TENDERS = [];
let CURRENT_FILTER = "all";
let QUICK_FILTER = "all";

let REVIEW_STATUSES =
  JSON.parse(localStorage.getItem("tenderReviewStatuses") || "{}");
  
let TENDER_NOTES =
  JSON.parse(localStorage.getItem("tenderNotes") || "{}");

let IGNORED_TENDERS =
  JSON.parse(localStorage.getItem("ignoredTenders") || "[]");

IGNORED_TENDERS.forEach(id=>{
  if(!REVIEW_STATUSES[id]){
    REVIEW_STATUSES[id] = "ignored";
  }
});

localStorage.setItem(
  "tenderReviewStatuses",
  JSON.stringify(REVIEW_STATUSES)
);

const CPV_NAMES = {
  "45100000": "Подготовка стройплощадки",
  "45112720": "Спорт / зоны отдыха",
  "45112700": "Ландшафт",
  "45112723": "Игровые площадки",
  "45112710": "Зелёные зоны"
};

function parseCSV(text){
  const rows = [];
  let current = "";
  let row = [];
  let insideQuotes = false;

  for(let i=0;i<text.length;i++){
    const char = text[i];
    const next = text[i+1];

    if(char === '"' && next === '"'){
      current += '"';
      i++;
    } else if(char === '"'){
      insideQuotes = !insideQuotes;
    } else if(char === "," && !insideQuotes){
      row.push(current);
      current = "";
    } else if((char === "\n" || char === "\r") && !insideQuotes){
      if(current || row.length){
        row.push(current);
        rows.push(row);
        row = [];
        current = "";
      }
    } else {
      current += char;
    }
  }

  if(current || row.length){
    row.push(current);
    rows.push(row);
  }

  return rows;
}

function getReviewStatus(id){
  return REVIEW_STATUSES[id] || "new";
}

function getReviewLabel(id){
  const status = getReviewStatus(id);

  if(status === "review") return "🔍 Need Review";
  if(status === "relevant") return "⭐ Relevant";
  if(status === "ignored") return "🗑 Ignored";

  return "🆕 New";
}

function getReviewClass(id){
  const status = getReviewStatus(id);

  if(status === "review") return "review-review";
  if(status === "relevant") return "review-relevant";
  if(status === "ignored") return "review-ignored";

  return "review-new";
}
async function saveTenderNote(tenderId){

  const note =
    document.getElementById("tenderNote")?.value || "";

  TENDER_NOTES[tenderId] = note;

  localStorage.setItem(
    "tenderNotes",
    JSON.stringify(TENDER_NOTES)
  );

  try{

    await supabaseClient
      .from("tender_reviews")
      .upsert({
        tender_id: tenderId,
        review_status: REVIEW_STATUSES[tenderId] || "new",
        note: note
      });

  }catch(e){
    console.log("Supabase note save error", e);
  }

  closeModal();
  render();
  updateStats();
}
async function setTenderReviewStatus(tenderId, status){

  REVIEW_STATUSES[tenderId] = status;

  if(status === "ignored"){
    if(!IGNORED_TENDERS.includes(tenderId)){
      IGNORED_TENDERS.push(tenderId);
    }
  }else{
    IGNORED_TENDERS =
      IGNORED_TENDERS.filter(x => x !== tenderId);
  }

  localStorage.setItem(
    "tenderReviewStatuses",
    JSON.stringify(REVIEW_STATUSES)
  );

  localStorage.setItem(
    "ignoredTenders",
    JSON.stringify(IGNORED_TENDERS)
  );

  try{

    await supabaseClient
      .from("tender_reviews")
      .upsert({
        tender_id: tenderId,
        review_status: status,
        note: TENDER_NOTES[tenderId] || ""
      });

  }catch(e){
    console.log("Supabase save error", e);
  }

  closeModal();
  render();
  updateStats();
}

function getCpvs(t){
  if(t.cpvs){
    return t.cpvs
      .split("|")
      .map(x => x.trim())
      .filter(Boolean);
  }

  const text = ((t.label || "") + " " + (t.name || "")).toLowerCase();
  const found = [];

  Object.keys(CPV_NAMES).forEach(code => {
    if(text.includes(code)) found.push(code);
  });

  return found;
}

function badgeClass(code){
  return "c" + code;
}

function renderBadges(t){
  const cpvs = getCpvs(t);

  if(!cpvs.length){
    return `<span class="badge default">Другое</span>`;
  }

  return cpvs.map(code => `
    <span class="badge ${badgeClass(code)}">
      ${code} — ${CPV_NAMES[code] || "CPV"}
    </span>
  `).join("");
}

function getStatusClass(status){
  const s = (status || "").toLowerCase();

  if(s.includes("объявлен") || s.includes("приём")) return "status-active";
  if(s.includes("оценка") || s.includes("подготовка")) return "status-warning";
  if(s.includes("победитель") || s.includes("договор")) return "status-success";
  if(s.includes("не найден") || s.includes("заверш") || s.includes("прекращ")) return "status-ended";

  return "status-ended";
}

function getDeadlineCountdown(deadline){
  if(!deadline){
    return { text:"—", class:"count-normal" };
  }

  const parts = deadline.split(".");

  if(parts.length !== 3){
    return { text:deadline, class:"count-normal" };
  }

  const d = parseInt(parts[0]);
  const m = parseInt(parts[1]) - 1;
  const y = parseInt(parts[2]);

  const endDate = new Date(y,m,d);
  const now = new Date();

  const diff = endDate.getTime() - now.getTime();
  const days = Math.ceil(diff / (1000 * 60 * 60 * 24));

  if(days < 0) return { text:"CLOSED", class:"count-closed" };
  if(days <= 2) return { text:days + " DAYS LEFT", class:"count-danger" };
  if(days <= 7) return { text:days + " DAYS LEFT", class:"count-warning" };

  return { text:days + " DAYS LEFT", class:"count-safe" };
}

function getPriority(price){
  const p = (price || "")
    .replace(/GEL/g,"")
    .replace(/`/g,"")
    .replace(/'/g,"")
    .replace(/\s/g,"");

  const n = parseFloat(p);

  if(n >= 1000000) return ["HIGH","high"];
  if(n >= 300000) return ["MEDIUM","medium"];

  return ["LOW","low"];
}

function formatBudget(num){
  if(num >= 1000000) return (num/1000000).toFixed(1) + "M";
  if(num >= 1000) return Math.round(num/1000) + "K";
  return Math.round(num);
}

function setQuickFilter(type){
  QUICK_FILTER = type;

  document.querySelectorAll(".qf").forEach(x=>{
    x.classList.remove("active-qf");
  });

  const btn = document.querySelector(
    `.qf[onclick="setQuickFilter('${type}')"]`
  );

  if(btn){
    btn.classList.add("active-qf");
  }

  render();
}

function setFilter(filter, button){
  CURRENT_FILTER = filter;

  document.querySelectorAll(".menu button")
    .forEach(btn => btn.classList.remove("active"));

  button.classList.add("active");
  render();
}

function shouldShowTender(t){
  const reviewStatus = getReviewStatus(t.id);

  if(CURRENT_FILTER === "review"){
    if(reviewStatus !== "review") return false;
  }else if(CURRENT_FILTER === "relevant"){
    if(reviewStatus !== "relevant") return false;
  }else if(CURRENT_FILTER === "ignored"){
    if(reviewStatus !== "ignored") return false;
  }else{
    if(reviewStatus === "ignored") return false;
  }

  const cpvs = getCpvs(t);
  const text = JSON.stringify(t).toLowerCase();

  const search = document.getElementById("searchInput").value.toLowerCase();
  const matchesSearch = text.includes(search);

  const matchesFilter =
    CURRENT_FILTER === "all" ||
    CURRENT_FILTER === "review" ||
    CURRENT_FILTER === "relevant" ||
    CURRENT_FILTER === "ignored" ||
    cpvs.includes(CURRENT_FILTER);

  if(QUICK_FILTER === "high"){
    const p = (t.price || "")
      .replace(/GEL/g,"")
      .replace(/`/g,"")
      .replace(/'/g,"")
      .replace(/\s/g,"");

    if((parseFloat(p) || 0) < 1000000) return false;
  }

  if(QUICK_FILTER === "playground"){
    if(!cpvs.includes("45112723")) return false;
  }

  if(QUICK_FILTER === "landscape"){
    if(!cpvs.some(c => c.startsWith("451127"))) return false;
  }

  if(QUICK_FILTER === "soon"){
    if(!t.deadline) return false;
  }

  return matchesSearch && matchesFilter;
}

function render(){
  const filtered = ALL_TENDERS.filter(shouldShowTender);
  const grid = document.getElementById("tenderGrid");

  if(!filtered.length){
    grid.innerHTML = `<div class="empty">Тендеры не найдены</div>`;
    return;
  }

  grid.innerHTML = filtered.slice().reverse().map(t => {
    const [priority, priorityClass] = getPriority(t.price);
    const c = getDeadlineCountdown(t.deadline);

    return `
      <div class="card">
        <div class="card-top">
          <div class="badges">${renderBadges(t)}</div>
          <div class="priority ${priorityClass}">${priority}</div>
        </div>

        <div class="title">${t.name || "Без названия"}</div>

        <div class="meta">
          📋 ${t.reg_id || "N/A"}<br>
          🧭 <span class="review-badge ${getReviewClass(t.id)}">${getReviewLabel(t.id)}</span><br>
          ${
  TENDER_NOTES[t.id]
  ?
  `📝 <span style="color:#2563eb;font-weight:700">Note added</span><br>`
  :
  ""
}
          📌 <span class="status-badge ${getStatusClass(t.status)}">${t.status || "—"}</span><br>
          🏢 ${t.org || "—"}<br>
          💰 ${t.price || "—"}<br>
          📅 ${t.deadline || "—"}<br>
          <span class="${c.class}">⏳ ${c.text}</span><br>
          🕒 ${t.last_seen || "—"}
        </div>

        <div class="actions">
          <button class="btn" onclick="openModal('${t.id}')">Детали</button>
          <a class="btn" href="${t.link}" target="_blank">Официальный сайт ↗</a>
        </div>
      </div>
    `;
  }).join("");
}

function openModal(tenderId){
  const t = ALL_TENDERS.find(x => x.id === tenderId);

  if(!t) return;

  document.getElementById("modalTitle").textContent =
    t.reg_id || "Tender";

  document.getElementById("modalBody").innerHTML = `
    <div class="modal-grid">

      <div class="modal-item">
        <div class="modal-label">Название</div>
        <div class="modal-value">${t.name || "—"}</div>
      </div>

      <div class="modal-item">
        <div class="modal-label">Review status</div>
        <div class="modal-value">
          <span class="review-badge ${getReviewClass(t.id)}">${getReviewLabel(t.id)}</span>
        </div>
      </div>

      <div class="modal-item">
        <div class="modal-label">Статус закупки</div>
        <div class="modal-value">
          <span class="status-badge ${getStatusClass(t.status)}">${t.status || "—"}</span>
        </div>
      </div>

      <div class="modal-item">
        <div class="modal-label">Организация</div>
        <div class="modal-value">${t.org || "—"}</div>
      </div>

      <div class="modal-item">
        <div class="modal-label">Бюджет</div>
        <div class="modal-value">${t.price || "—"}</div>
      </div>

      <div class="modal-item">
        <div class="modal-label">Deadline</div>
        <div class="modal-value">${t.deadline || "—"}</div>
      </div>

      <div class="modal-item">
        <div class="modal-label">Найден</div>
        <div class="modal-value">${t.date_found || "—"}</div>
      </div>

      <div class="modal-item">
        <div class="modal-label">Последняя проверка</div>
        <div class="modal-value">${t.last_seen || "—"}</div>
      </div>

    </div>

    <div style="margin-top:22px">
      <div class="modal-label">CPV Categories</div>
      ${renderBadges(t)}
    </div>
    <div style="margin-top:22px">

  <div class="modal-label">
    Tender Notes
  </div>

  <textarea
    id="tenderNote"
    style="
      width:100%;
      min-height:120px;
      border:1px solid #d1d5db;
      border-radius:14px;
      padding:14px;
      font-size:14px;
      resize:vertical;
      font-family:Arial;
    "
    placeholder="Write your tender notes here..."
  >${TENDER_NOTES[t.id] || ""}</textarea>

</div>

    <div class="modal-actions">
      <a class="btn" href="${t.link}" target="_blank">
        Официальный тендер ↗
      </a>
      
      <button class="btn btn-muted" onclick="saveTenderNote('${t.id}')">
  💾 Save Note
      </button>

      <button class="btn btn-warning" onclick="setTenderReviewStatus('${t.id}', 'review')">
        🔍 Need Review
      </button>

      <button class="btn btn-success" onclick="setTenderReviewStatus('${t.id}', 'relevant')">
        ⭐ Relevant
      </button>

      ${
        getReviewStatus(t.id) === "ignored"
        ?
        `
        <button class="btn btn-muted" onclick="setTenderReviewStatus('${t.id}', 'new')">
          ♻ Restore
        </button>
        `
        :
        `
        <button class="btn btn-danger" onclick="setTenderReviewStatus('${t.id}', 'ignored')">
          🗑 Ignore
        </button>
        `
      }
    </div>
  `;

  document.getElementById("tenderModal").style.display = "block";
}

function closeModal(){
  document.getElementById("tenderModal").style.display = "none";
}

window.onclick = function(event){
  const modal = document.getElementById("tenderModal");

  if(event.target === modal){
    closeModal();
  }
}

function updateStats(){
  const visibleActive = ALL_TENDERS.filter(t => getReviewStatus(t.id) !== "ignored");

  document.getElementById("totalCount").textContent = visibleActive.length;

  const today = new Date().toISOString().slice(0,10);

  document.getElementById("todayCount").textContent =
    visibleActive.filter(t => (t.date_found || "").startsWith(today)).length;

  document.getElementById("reviewCount").textContent =
    ALL_TENDERS.filter(t => getReviewStatus(t.id) === "review").length;

  let budget = 0;

  visibleActive.forEach(t => {
    const p = (t.price || "")
      .replace(/GEL/g,"")
      .replace(/`/g,"")
      .replace(/'/g,"")
      .replace(/\s/g,"");

    budget += parseFloat(p) || 0;
  });

  document.getElementById("budgetCount").textContent =
    formatBudget(budget) + " GEL";
}

async function loadData(){
  const res = await fetch(CSV_FILE + "?v=" + Date.now());
  const text = await res.text();

  const rows = parseCSV(text);
  const headers = rows.shift().map(h => h.replace(/\uFEFF/g, "").trim());

  ALL_TENDERS = rows.map(r => {
    const obj = {};
    headers.forEach((h,i) => obj[h] = r[i] || "");
    return obj;
  }).filter(t => t.id && t.id.trim() !== "");
try{

  const { data, error } =
    await supabaseClient
      .from("tender_reviews")
      .select("*");

  if(!error && data){

    data.forEach(row => {

      REVIEW_STATUSES[row.tender_id] =
        row.review_status || "new";

      TENDER_NOTES[row.tender_id] =
        row.note || "";

    });

  }

}catch(e){
  console.log("Supabase load error", e);
}
  updateStats();
  render();
}

document.getElementById("searchInput").addEventListener("input", render);

loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
