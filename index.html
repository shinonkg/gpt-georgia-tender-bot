<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GPT Georgia Tender Monitor</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f5f7;
  color:#1f2937;
}

.wrapper{display:flex;min-height:100vh}

.sidebar{
  width:290px;
  background:#111827;
  color:white;
  padding:24px;
}

.logo{
  font-size:22px;
  font-weight:700;
  margin-bottom:26px;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.menu button{
  background:rgba(255,255,255,0.04);
  border:none;
  color:white;
  padding:13px;
  border-radius:12px;
  cursor:pointer;
  text-align:left;
  font-size:14px;
  line-height:1.35;
}

.menu button.active{background:#2563eb}
  .menu button:hover{
  background:#2563eb;
  transform:translateX(3px);
  transition:0.2s;
}

.main{
  flex:1;
  padding:28px;
}
  .hero{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:24px;
}

.hero h1{
  margin:0;
  font-size:32px;
  font-weight:800;
}

.hero p{
  margin-top:8px;
  color:#6b7280;
  font-size:15px;
}

.hero-status{
  background:#dcfce7;
  color:#166534;
  padding:10px 16px;
  border-radius:999px;
  font-weight:700;
  font-size:13px;
}

.search input{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  font-size:16px;
  box-shadow:0 4px 18px rgba(0,0,0,0.06);
  margin-bottom:24px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  margin-bottom:28px;
}

.stat{
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 4px 18px rgba(0,0,0,0.06);
  border:1px solid #eef2f7;
  transition:0.25s;
}
.stat:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(37,99,235,0.10);
}

.stat span{color:#6b7280;font-size:14px}
.stat strong{display:block;margin-top:10px;font-size:28px}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(360px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:22px;
  padding:22px;
  box-shadow:0 4px 20px rgba(0,0,0,0.06);
  border:1px solid #e5e7eb;
  transition:0.25s;
}
  .card:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 30px rgba(0,0,0,0.10);
}

.badges{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:14px;
}

.badge{
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

.c45100000{background:#fef3c7;color:#92400e}
.c45112700{background:#dcfce7;color:#166534}
.c45112710{background:#d1fae5;color:#047857}
.c45112720{background:#dbeafe;color:#1d4ed8}
.c45112723{background:#fce7f3;color:#be185d}
.default{background:#e5e7eb;color:#374151}
  .status-badge{
  display:inline-flex;
  align-items:center;
  padding:3px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  margin:2px 0;
}

.status-active{
  background:#dbeafe;
  color:#1d4ed8;
}

.status-warning{
  background:#fef3c7;
  color:#92400e;
}

.status-success{
  background:#dcfce7;
  color:#166534;
}

.status-ended{
  background:#e5e7eb;
  color:#374151;
}

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}

.priority{
  font-size:13px;
  font-weight:700;
}

.high{color:#dc2626}
.medium{color:#d97706}
.low{color:#6b7280}

.title{
  font-size:18px;
  font-weight:700;
  line-height:1.4;
  margin-bottom:14px;
}

.meta{
  color:#4b5563;
  line-height:1.8;
  font-size:15px;
}

.actions{
  margin-top:18px;
  display:flex;
  gap:10px;
}

.btn{
  text-decoration:none;
  background:#111827;
  color:white;
  padding:12px 16px;
  border-radius:12px;
  font-size:14px;
  font-weight:700;
}

.btn:hover{background:#2563eb}

.empty{
  background:white;
  padding:30px;
  border-radius:20px;
}

@media(max-width:1000px){
  .wrapper{flex-direction:column}
  .sidebar{width:100%}
  .stats{grid-template-columns:1fr 1fr}
}

@media(max-width:650px){
  .stats{grid-template-columns:1fr}
  .grid{grid-template-columns:1fr}
}
.modal{
  display:none;
  position:fixed;
  z-index:9999;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(17,24,39,0.65);
  backdrop-filter:blur(4px);
}

.modal-content{
  background:white;
  width:min(700px,92%);
  margin:60px auto;
  border-radius:24px;
  padding:28px;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
  animation:modalShow 0.2s ease;
}

@keyframes modalShow{
  from{
    transform:translateY(15px);
    opacity:0;
  }
  to{
    transform:translateY(0);
    opacity:1;
  }
}
.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:22px;
}

.modal-header h2{
  margin:0;
  font-size:24px;
}

.close-btn{
  border:none;
  background:#f3f4f6;
  width:38px;
  height:38px;
  border-radius:999px;
  cursor:pointer;
  font-size:16px;
  font-weight:700;
}

.close-btn:hover{
  background:#e5e7eb;
}

.modal-body{
  color:#374151;
  line-height:1.8;
}  
</style>
</head>

<body>
<div class="wrapper">

  <div class="sidebar">
    <div class="logo">🇬🇪 Tender Monitor</div>

    <div class="menu">
      <button class="active" onclick="setFilter('all', this)">Все тендеры</button>
      <button onclick="setFilter('45100000', this)">45100000<br>Подготовка стройплощадки</button>
      <button onclick="setFilter('45112720', this)">45112720<br>Спорт / зоны отдыха</button>
      <button onclick="setFilter('45112700', this)">45112700<br>Ландшафтные работы</button>
      <button onclick="setFilter('45112723', this)">45112723<br>Игровые площадки</button>
      <button onclick="setFilter('45112710', this)">45112710<br>Зелёные зоны</button>
    </div>
  </div>

  <div class="main">
    <div class="hero">
  <div>
    <h1>🇬🇪 Georgia Procurement Intelligence</h1>
    <p>AI-powered CPV monitoring & tender lifecycle tracking</p>
  </div>

  <div class="hero-status">
    ● LIVE MONITORING
  </div>
</div>

    <div class="search">
      <input
        type="text"
        id="searchInput"
        placeholder="Поиск: Rustavi, NAT2600, 45112723..."
      />
    </div>

    <div class="stats">
      <div class="stat">
        <span>ACTIVE TENDERS</span>
        <strong id="totalCount">0</strong>
      </div>

      <div class="stat">
        <span>NEW TODAY</span>
        <strong id="todayCount">0</strong>
      </div>

      <div class="stat">
        <span>TRACKED CPVs</span>
        <strong id="categoryCount">0</strong>
      </div>

      <div class="stat">
        <span>OTAL VALUE</span>
        <strong id="budgetCount">—</strong>
      </div>
    </div>

    <div class="grid" id="tenderGrid"></div>

  </div>
</div>

<script>
const CSV_FILE = "tenders.csv";

let ALL_TENDERS = [];
let CURRENT_FILTER = "all";

const CPV_NAMES = {
  "45100000": "Подготовка стройплощадки",
  "45112720": "Спорт / зоны отдыха",
  "45112700": "Ландшафт",
  "45112723": "Игровые площадки",
  "45112710": "Зелёные зоны"
};

function parseCSV(text){
  const rows = [];
  let current = "";
  let row = [];
  let insideQuotes = false;

  for(let i=0;i<text.length;i++){
    const char = text[i];
    const next = text[i+1];

    if(char === '"' && next === '"'){
      current += '"';
      i++;
    } else if(char === '"'){
      insideQuotes = !insideQuotes;
    } else if(char === "," && !insideQuotes){
      row.push(current);
      current = "";
    } else if((char === "\n" || char === "\r") && !insideQuotes){
      if(current || row.length){
        row.push(current);
        rows.push(row);
        row = [];
        current = "";
      }
    } else {
      current += char;
    }
  }

  if(current || row.length){
    row.push(current);
    rows.push(row);
  }

  return rows;
}

function getCpvs(t){
  if(t.cpvs){
    return t.cpvs
      .split("|")
      .map(x => x.trim())
      .filter(Boolean);
  }

  const text = ((t.label || "") + " " + (t.name || "")).toLowerCase();
  const found = [];

  Object.keys(CPV_NAMES).forEach(code => {
    if(text.includes(code)) found.push(code);
  });

  return found;
}

function badgeClass(code){
  return "c" + code;
}

function renderBadges(t){
  const cpvs = getCpvs(t);

  if(!cpvs.length){
    return `<span class="badge default">Другое</span>`;
  }

  return cpvs.map(code => `
    <span class="badge ${badgeClass(code)}">
      ${code} — ${CPV_NAMES[code] || "CPV"}
    </span>
  `).join("");
}
function getStatusClass(status){
  const s = (status || "").toLowerCase();

  if(s.includes("объявлен") || s.includes("приём")) return "status-active";
  if(s.includes("оценка") || s.includes("подготовка")) return "status-warning";
  if(s.includes("победитель") || s.includes("договор")) return "status-success";
  if(s.includes("не найден") || s.includes("заверш") || s.includes("прекращ")) return "status-ended";

  return "status-ended";
}
function getPriority(price){
  const p = (price || "")
    .replace(/GEL/g,"")
    .replace(/`/g,"")
    .replace(/'/g,"")
    .replace(/\s/g,"");

  const n = parseFloat(p);

  if(n >= 1000000) return ["HIGH","high"];
  if(n >= 300000) return ["MEDIUM","medium"];
  return ["LOW","low"];
}

function formatBudget(num){
  if(num >= 1000000) return (num/1000000).toFixed(1) + "M";
  if(num >= 1000) return Math.round(num/1000) + "K";
  return Math.round(num);
}

function render(){
  const search = document.getElementById("searchInput").value.toLowerCase();

  const filtered = ALL_TENDERS.filter(t => {
    const cpvs = getCpvs(t);
    const text = JSON.stringify(t).toLowerCase();

    const matchesSearch = text.includes(search);
    const matchesFilter = CURRENT_FILTER === "all" || cpvs.includes(CURRENT_FILTER);

    return matchesSearch && matchesFilter;
  });

  const grid = document.getElementById("tenderGrid");

  if(!filtered.length){
    grid.innerHTML = `<div class="empty">Тендеры не найдены</div>`;
    return;
  }

  grid.innerHTML = filtered.slice().reverse().map(t => {
    const [priority, priorityClass] = getPriority(t.price);

    return `
      <div class="card">
        <div class="card-top">
          <div class="badges">${renderBadges(t)}</div>
          <div class="priority ${priorityClass}">${priority}</div>
        </div>

        <div class="title">${t.name || "Без названия"}</div>

<div class="meta">
  📋 ${t.reg_id || "N/A"}<br>
  📌 <span class="status-badge ${getStatusClass(t.status)}">${t.status || "—"}</span><br>
  🏢 ${t.org || "—"}<br>
  💰 ${t.price || "—"}<br>
  📅 ${t.deadline || "—"}<br>
  🕒 ${t.last_seen || "—"}
</div>

        <div class="actions">
          <button class="btn" onclick="openModal('${t.id}')">Детали</button>
<a class="btn" href="${t.link}" target="_blank">Официальный сайт ↗</a>
        </div>
      </div>
    `;
  }).join("");
}
function openModal(tenderId){
  const t = ALL_TENDERS.find(x => x.id === tenderId);

  if(!t) return;

  document.getElementById("modalTitle").textContent =
    t.reg_id || "Tender";

  document.getElementById("modalBody").innerHTML = `
    <p><strong>Название:</strong><br>${t.name || "—"}</p>
    <p><strong>Статус:</strong><br>
      <span class="status-badge ${getStatusClass(t.status)}">${t.status || "—"}</span>
    </p>
    <p><strong>CPV:</strong><br>${renderBadges(t)}</p>
    <p><strong>Организация:</strong><br>${t.org || "—"}</p>
    <p><strong>Бюджет:</strong><br>${t.price || "—"}</p>
    <p><strong>Срок:</strong><br>${t.deadline || "—"}</p>
    <p><strong>Найден:</strong><br>${t.date_found || "—"}</p>
    <p><strong>Последняя проверка:</strong><br>${t.last_seen || "—"}</p>

    <div class="actions">
      <a class="btn" href="${t.link}" target="_blank">Открыть официальный тендер ↗</a>
    </div>
  `;

  document.getElementById("tenderModal").style.display = "block";
}

function closeModal(){
  document.getElementById("tenderModal").style.display = "none";
}

window.onclick = function(event){
  const modal = document.getElementById("tenderModal");
  if(event.target === modal){
    closeModal();
  }
}
  
function setFilter(filter, button){
  CURRENT_FILTER = filter;

  document.querySelectorAll(".menu button")
    .forEach(btn => btn.classList.remove("active"));

  button.classList.add("active");
  render();
}

async function loadData(){
  const res = await fetch(CSV_FILE + "?v=" + Date.now());
  const text = await res.text();

  const rows = parseCSV(text);
  const headers = rows.shift().map(h => h.replace(/\uFEFF/g, "").trim());

  ALL_TENDERS = rows.map(r => {
    const obj = {};
    headers.forEach((h,i) => obj[h] = r[i] || "");
    return obj;
  }).filter(t => t.id && t.id.trim() !== "");

  document.getElementById("totalCount").textContent = ALL_TENDERS.length;

  const allCpvs = new Set();
  ALL_TENDERS.forEach(t => getCpvs(t).forEach(c => allCpvs.add(c)));
  document.getElementById("categoryCount").textContent = allCpvs.size;

  const today = new Date().toISOString().slice(0,10);
  document.getElementById("todayCount").textContent =
    ALL_TENDERS.filter(t => (t.date_found || "").startsWith(today)).length;

  let budget = 0;
  ALL_TENDERS.forEach(t => {
    const p = (t.price || "")
      .replace(/GEL/g,"")
      .replace(/`/g,"")
      .replace(/'/g,"")
      .replace(/\s/g,"");

    budget += parseFloat(p) || 0;
  });

  document.getElementById("budgetCount").textContent = formatBudget(budget) + " GEL";

  render();
}

document.getElementById("searchInput").addEventListener("input", render);

loadData();
setInterval(loadData, 5 * 60 * 1000);  
</script>
 <div id="tenderModal" class="modal">
  <div class="modal-content">

    <div class="modal-header">
      <h2 id="modalTitle">Tender</h2>

      <button class="close-btn" onclick="closeModal()">
        ✕
      </button>
    </div>

    <div class="modal-body" id="modalBody"></div>

  </div>
</div> 
</body>
</html>
