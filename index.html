<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>GPT Georgia Tender Monitor</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f5f7;
  color:#1f2937;
}

.wrapper{
  display:flex;
  min-height:100vh;
}

.sidebar{
  width:260px;
  background:#111827;
  color:white;
  padding:24px;
}

.logo{
  font-size:22px;
  font-weight:700;
  margin-bottom:30px;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.menu button{
  background:#1f2937;
  border:none;
  color:white;
  padding:14px;
  border-radius:12px;
  cursor:pointer;
  text-align:left;
  font-size:15px;
}

.menu button.active{
  background:#2563eb;
}

.main{
  flex:1;
  padding:28px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-bottom:24px;
}

.search{
  flex:1;
}

.search input{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  font-size:16px;
  box-shadow:0 4px 18px rgba(0,0,0,0.06);
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  margin-bottom:28px;
}

.stat{
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 4px 18px rgba(0,0,0,0.06);
}

.stat span{
  color:#6b7280;
  font-size:14px;
}

.stat strong{
  display:block;
  margin-top:10px;
  font-size:28px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(360px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:22px;
  padding:22px;
  box-shadow:0 4px 20px rgba(0,0,0,0.06);
  border:1px solid #e5e7eb;
}

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}

.badge{
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

.landscape{
  background:#dcfce7;
  color:#166534;
}

.fitness{
  background:#dbeafe;
  color:#1d4ed8;
}

.playground{
  background:#fce7f3;
  color:#be185d;
}

.construction{
  background:#fef3c7;
  color:#92400e;
}

.default{
  background:#e5e7eb;
  color:#374151;
}

.priority{
  font-size:13px;
  font-weight:700;
}

.high{
  color:#dc2626;
}

.medium{
  color:#d97706;
}

.low{
  color:#6b7280;
}

.title{
  font-size:18px;
  font-weight:700;
  line-height:1.4;
  margin-bottom:14px;
}

.meta{
  color:#4b5563;
  line-height:1.8;
  font-size:15px;
}

.actions{
  margin-top:18px;
  display:flex;
  gap:10px;
}

.btn{
  text-decoration:none;
  background:#111827;
  color:white;
  padding:12px 16px;
  border-radius:12px;
  font-size:14px;
  font-weight:700;
}

.btn:hover{
  background:#2563eb;
}

.empty{
  background:white;
  padding:30px;
  border-radius:20px;
}

@media(max-width:1000px){

  .wrapper{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
  }

  .stats{
    grid-template-columns:1fr 1fr;
  }

}

@media(max-width:650px){

  .stats{
    grid-template-columns:1fr;
  }

  .grid{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<body>

<div class="wrapper">

  <div class="sidebar">

    <div class="logo">
      🇬🇪 Tender Monitor
    </div>

    <div class="menu">
      <button class="active" onclick="setFilter('all')">Все тендеры</button>
      <button onclick="setFilter('landscape')">Ландшафт</button>
      <button onclick="setFilter('fitness')">Фитнес</button>
      <button onclick="setFilter('playground')">Игровые</button>
      <button onclick="setFilter('construction')">Стройка</button>
    </div>

  </div>

  <div class="main">

    <div class="topbar">

      <div class="search">
        <input
          type="text"
          id="searchInput"
          placeholder="Поиск: Rustavi, NAT2600, landscape..."
        />
      </div>

    </div>

    <div class="stats">

      <div class="stat">
        <span>Всего тендеров</span>
        <strong id="totalCount">0</strong>
      </div>

      <div class="stat">
        <span>Сегодня</span>
        <strong id="todayCount">0</strong>
      </div>

      <div class="stat">
        <span>Категорий</span>
        <strong id="categoryCount">0</strong>
      </div>

      <div class="stat">
        <span>Бюджет</span>
        <strong id="budgetCount">—</strong>
      </div>

    </div>

    <div class="grid" id="tenderGrid"></div>

  </div>

</div>

<script>

const CSV_FILE = "tenders.csv";

let ALL_TENDERS = [];
let CURRENT_FILTER = "all";

function parseCSV(text){

  const rows = [];
  let current = '';
  let row = [];
  let insideQuotes = false;

  for(let i=0;i<text.length;i++){

    const char = text[i];
    const next = text[i+1];

    if(char === '"' && next === '"'){
      current += '"';
      i++;
    }

    else if(char === '"'){
      insideQuotes = !insideQuotes;
    }

    else if(char === ',' && !insideQuotes){
      row.push(current);
      current = '';
    }

    else if((char === '\n' || char === '\r') && !insideQuotes){

      if(current || row.length){
        row.push(current);
        rows.push(row);
        row = [];
        current = '';
      }

    }

    else{
      current += char;
    }

  }

  if(current || row.length){
    row.push(current);
    rows.push(row);
  }

  return rows;

}

function getCategory(t){

  const c = (t.label || "").toLowerCase();

  if(c.includes("451127")) return "landscape";
  if(c.includes("374400")) return "fitness";
  if(c.includes("375")) return "playground";
  if(c.includes("451000")) return "construction";

  return "default";

}

function getBadge(cat){

  if(cat === "landscape") return "Ландшафт";
  if(cat === "fitness") return "Фитнес";
  if(cat === "playground") return "Игровые";
  if(cat === "construction") return "Стройка";

  return "Другое";

}

function getPriority(price){

  const p = (price || "")
    .replace(/GEL/g,'')
    .replace(/`/g,'')
    .replace(/'/g,'')
    .replace(/\s/g,'');

  const n = parseFloat(p);

  if(n >= 1000000) return ["HIGH","high"];
  if(n >= 300000) return ["MEDIUM","medium"];

  return ["LOW","low"];

}

function formatBudget(num){

  if(num >= 1000000){
    return (num/1000000).toFixed(1) + "M";
  }

  if(num >= 1000){
    return Math.round(num/1000) + "K";
  }

  return Math.round(num);

}

function render(){

  const search = document
    .getElementById("searchInput")
    .value
    .toLowerCase();

  let filtered = ALL_TENDERS.filter(t => {

    const text = JSON.stringify(t).toLowerCase();

    const matchesSearch = text.includes(search);

    const matchesFilter =
      CURRENT_FILTER === "all"
      || getCategory(t) === CURRENT_FILTER;

    return matchesSearch && matchesFilter;

  });

  const grid = document.getElementById("tenderGrid");

  if(!filtered.length){

    grid.innerHTML = `
      <div class="empty">
        Тендеры не найдены
      </div>
    `;

    return;

  }

  grid.innerHTML = filtered
    .slice()
    .reverse()
    .map(t => {

      const cat = getCategory(t);

      const [priority,priorityClass] = getPriority(t.price);

      return `

      <div class="card">

        <div class="card-top">

          <div class="badge ${cat}">
            ${getBadge(cat)}
          </div>

          <div class="priority ${priorityClass}">
            ${priority}
          </div>

        </div>

        <div class="title">
          ${t.name || "Без названия"}
        </div>

        <div class="meta">

          📋 ${t.reg_id || "N/A"}<br>
          🏢 ${t.org || "—"}<br>
          💰 ${t.price || "—"}<br>
          📅 ${t.deadline || "—"}

        </div>

        <div class="actions">

          <a
            class="btn"
            href="${t.link}"
            target="_blank"
          >
            Открыть тендер
          </a>

        </div>

      </div>

      `;

    })
    .join("");

}

function setFilter(f){

  CURRENT_FILTER = f;

  document
    .querySelectorAll(".menu button")
    .forEach(btn => btn.classList.remove("active"));

  event.target.classList.add("active");

  render();

}

async function loadData(){

  const res = await fetch(
    CSV_FILE + "?v=" + Date.now()
  );

  const text = await res.text();

  const rows = parseCSV(text);

  const headers = rows.shift();

  ALL_TENDERS = rows
    .map(r => {

      const obj = {};

      headers.forEach((h,i)=>{
        obj[h] = r[i] || "";
      });

      return obj;

    })
    .filter(t => t.id);

  document.getElementById("totalCount")
    .textContent = ALL_TENDERS.length;

  const categories = new Set(
    ALL_TENDERS.map(t => getCategory(t))
  );

  document.getElementById("categoryCount")
    .textContent = categories.size;

  const today = new Date()
    .toISOString()
    .slice(0,10);

  const todayCount = ALL_TENDERS.filter(t =>
    (t.date_found || "").startsWith(today)
  ).length;

  document.getElementById("todayCount")
    .textContent = todayCount;

  let budget = 0;

  ALL_TENDERS.forEach(t => {

    const p = (t.price || "")
      .replace(/GEL/g,'')
      .replace(/`/g,'')
      .replace(/'/g,'')
      .replace(/\s/g,'');

    budget += parseFloat(p) || 0;

  });

  document.getElementById("budgetCount")
    .textContent = formatBudget(budget) + " GEL";

  render();

}

document
  .getElementById("searchInput")
  .addEventListener("input",render);

loadData();

</script>

</body>
</html>
