name: Georgia Tender Monitor

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC
    - cron: "0 17 * * *"  # 17:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run bot
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python georgia_tender_bot.py --once

      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add tenders.csv tender_data.json customer_tenders.csv || true
          git diff --staged --quiet || git commit -m "Update tender data $(date -u +%Y-%m-%d)"
          git push
