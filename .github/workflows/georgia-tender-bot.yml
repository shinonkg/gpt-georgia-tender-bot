name: Georgia Tender Monitor

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC
    - cron: "0 9 * * *"   # 09:00 UTC / 12:00 Turkey-Georgia time
    - cron: "0 17 * * *"  # 17:00 UTC
  workflow_dispatch:
    inputs:
      send_test_telegram:
        description: "Send a Telegram test message before refreshing data"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Check Telegram configuration
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::warning::TELEGRAM_TOKEN and TELEGRAM_CHAT_ID secrets are missing. Data refresh will continue, but Telegram notifications will be skipped."
          else
            echo "Telegram secrets are configured."
          fi

      - name: Send Telegram test message
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.send_test_telegram == 'true' }}
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python georgia_tender_bot.py --test-telegram

      - name: Run bot
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python georgia_tender_bot.py --once

      - name: Refresh main tender dashboard data
        run: node scripts/refresh_tenders.mjs

      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add tenders.csv tender_data.json customer_tenders.csv || true
          git diff --staged --quiet || git commit -m "Update tender data $(date -u +%Y-%m-%d)"
          git push
